<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proximity Groceries Scorecard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6f8;color:#1a1a2e;font-size:13px}
/* HEADER */
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.header-logo{width:32px;height:32px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.header-title{font-size:15px;font-weight:700;color:#1a1a2e;flex:1}
.header-sub{font-size:11px;color:#64748b;margin-top:1px}
.toggle-group{display:flex;background:#f1f5f9;border-radius:8px;padding:3px;gap:2px}
.toggle-btn{padding:5px 14px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:#64748b;transition:all .15s}
.toggle-btn.active{background:#fff;color:#1a1a2e;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.updated{font-size:11px;color:#94a3b8;white-space:nowrap}
/* TABS */
.tabs-bar{background:#fff;border-bottom:2px solid #e2e8f0;padding:0 20px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 16px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.tab-btn.active{color:#667eea;border-bottom-color:#667eea;font-weight:600}
.tab-btn:hover:not(.active){color:#1a1a2e;background:#f8fafc}
/* CONTENT */
.content{padding:16px 20px}
/* TABLE */
.table-wrap{overflow-x:auto;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);background:#fff}
.sc-table{border-collapse:collapse;width:100%;min-width:600px}
.sc-table th{background:#f8fafc;color:#475569;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:8px 12px;border-bottom:2px solid #e2e8f0;white-space:nowrap;text-align:right}
.sc-table th:first-child{text-align:left;min-width:200px;position:sticky;left:0;background:#f8fafc;z-index:2}
.sc-table td{padding:7px 12px;border-bottom:1px solid #f1f5f9;text-align:right;white-space:nowrap;color:#334155}
.sc-table td:first-child{text-align:left;position:sticky;left:0;background:#fff;z-index:1;font-weight:500;color:#1e293b}
.sc-table tr:last-child td{border-bottom:none}
.sc-table tr:hover td{background:#fafbff}
.sc-table tr:hover td:first-child{background:#fafbff}
.sc-table .last-col{font-weight:600}
.sc-table .good{color:#16a34a}
.sc-table .bad{color:#dc2626}
.sc-table .neutral{color:#334155}
.sc-table .pct-good{color:#16a34a;font-size:10px;margin-left:2px}
.sc-table .pct-bad{color:#dc2626;font-size:10px;margin-left:2px}
.section-title{font-size:13px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin:20px 0 8px}
/* SPARKLINE */
.spark{display:inline-block;vertical-align:middle}
/* STORE BREAKDOWN */
.store-section{margin-top:16px;border-radius:10px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
.store-section-header{padding:10px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.store-section-header h3{font-size:12px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.4px}
.store-toggle-icon{color:#94a3b8;font-size:14px;transition:transform .2s}
.store-section-body{display:none}
.store-section-body.open{display:block}
/* CHARTS */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:16px;margin-top:4px}
.chart-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:16px}
.chart-card h3{font-size:12px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
.chart-card canvas{max-height:200px}
/* PLACEHOLDER */
.placeholder{background:#fff;border-radius:10px;padding:40px;text-align:center;color:#94a3b8;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.placeholder h3{font-size:14px;font-weight:600;color:#475569;margin-bottom:8px}
/* STORE PILLS */
.store-pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;color:#fff;margin-right:4px}
/* KPI CARDS */
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.kpi-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:14px 18px;min-width:130px;flex:1}
.kpi-label{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.kpi-value{font-size:20px;font-weight:700;color:#1a1a2e;margin-top:2px}
.kpi-delta{font-size:11px;margin-top:2px}
.kpi-delta.up{color:#16a34a}
.kpi-delta.down{color:#dc2626}
/* P&L WATERFALL COLORS */
.sc-table .pl-positive{color:#16a34a;font-weight:600}
.sc-table .pl-negative{color:#dc2626;font-weight:600}
.sc-table .pl-ratio{color:#667eea;font-size:11px}
.sc-table .pl-separator td{background:#f8fafc !important;border-top:2px solid #e2e8f0 !important;font-weight:700 !important;color:#1e293b !important}
/* BADGE */
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600}
.badge-green{background:#dcfce7;color:#16a34a}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-blue{background:#dbeafe;color:#2563eb}
.badge-yellow{background:#fef9c3;color:#a16207}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-logo">PG</div>
    <div>
      <div class="header-title">Proximity Groceries Scorecard</div>
      <div class="header-sub" id="updated-label"></div>
    </div>
    <div style="flex:1"></div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-semanal" onclick="setView('semanal')">Semanal</button>
      <button class="toggle-btn" id="btn-mensual" onclick="setView('mensual')">Mensual</button>
      <button class="toggle-btn" id="btn-diario"  onclick="setView('diario')">Diario</button>
    </div>
  </div>

  <div class="tabs-bar" id="tabs-bar"></div>
  <div class="content" id="content"></div>
</div>

// ── FORMAT HELPERS ────────────────────────────────────────────────────────────

function fmtNMV(v) {
  if (v == null) return '—';
  if (Math.abs(v) >= 1e9) return (v >= 0 ? '' : '-') + '$' + (Math.abs(v)/1e9).toFixed(1) + 'B';
  if (Math.abs(v) >= 1e6) return (v >= 0 ? '' : '-') + '$' + (Math.abs(v)/1e6).toFixed(1) + 'M';
  if (Math.abs(v) >= 1e3) return (v >= 0 ? '' : '-') + '$' + Math.round(Math.abs(v)/1e3) + 'K';
  return '$' + Math.round(v).toLocaleString('es-AR');
}
function fmtCnt(v)   { if (v == null) return '—'; return Math.round(v).toLocaleString('es-AR'); }
function fmtPct(v)   { if (v == null) return '—'; return (v*100).toFixed(1) + '%'; }
function fmtMoney(v) {
  if (v == null) return '—';
  if (Math.abs(v) >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
  if (Math.abs(v) >= 1e3) return '$' + Math.round(v/1e3) + 'K';
  return '$' + Math.round(v).toLocaleString('es-AR');
}
function fmtRatio(v, dec) {
  if (v == null) return '—';
  return v.toFixed(dec != null ? dec : 1);
}
function fmt(v, type) {
  switch(type) {
    case 'nmv':    return fmtNMV(v);
    case 'cnt':    return fmtCnt(v);
    case 'pct':    return fmtPct(v);
    case 'money':  return fmtMoney(v);
    case 'ratio':  return fmtRatio(v, 1);
    case 'ratio2': return fmtRatio(v, 2);
    case 'int':    return v == null ? '—' : String(Math.round(v));
    default:       return v == null ? '—' : String(v);
  }
}
function deltaClass(delta, higherBetter) {
  if (delta == null || Math.abs(delta) < 0.001) return 'neutral';
  if (higherBetter) return delta > 0 ? 'good' : 'bad';
  return delta < 0 ? 'good' : 'bad';
}
function deltaTxt(delta) {
  if (delta == null) return '';
  const sign = delta >= 0 ? '+' : '';
  return ` <span class="${delta >= 0 ? 'pct-good':'pct-bad'}">${sign}${(delta*100).toFixed(1)}%</span>`;
}

// ── SPARKLINE SVG ─────────────────────────────────────────────────────────────

function sparkline(vals, w, h, color) {
  w = w || 70; h = h || 22; color = color || '#667eea';
  const clean = vals.filter(v => v != null);
  if (clean.length < 2) return '<svg width="'+w+'" height="'+h+'"></svg>';
  const mn = Math.min(...clean), mx = Math.max(...clean);
  const range = mx - mn || 1;
  const pts = clean.map((v, i) => {
    const x = i / (clean.length-1) * (w-4) + 2;
    const y = h - 2 - ((v-mn)/range) * (h-4);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ── TABLE BUILDER ─────────────────────────────────────────────────────────────

function buildTable(periods, labelMap, rowDefs, dataMap, opts) {
  opts = opts || {};
  const showSparkline = opts.showSparkline !== false;
  let h = '<div class="table-wrap"><table class="sc-table"><thead><tr>';
  h += '<th>Métrica</th>';
  for (const p of periods) {
    const lbl = (labelMap && labelMap[p]) || p;
    h += `<th>${lbl}</th>`;
  }
  if (showSparkline) h += '<th style="min-width:80px">Tendencia</th>';
  h += '</tr></thead><tbody>';

  for (const row of rowDefs) {
    // Section separator row
    if (row.separator) {
      h += `<tr class="pl-separator"><td colspan="${periods.length + (showSparkline ? 2 : 1)}" style="padding:6px 12px;font-size:11px;letter-spacing:.4px;text-transform:uppercase">${row.name}</td></tr>`;
      continue;
    }
    const vals = periods.map(p => {
      const rec = dataMap[p];
      return rec ? (rec[row.key] != null ? rec[row.key] : null) : null;
    });
    const lastIdx = vals.length - 1;
    const lastVal = vals[lastIdx];
    const prevVal = vals.slice(0, lastIdx).reverse().find(v => v != null);
    const delta = (lastVal != null && prevVal != null && prevVal !== 0)
                  ? (lastVal - prevVal) / Math.abs(prevVal) : null;
    const extraClass = row.extraClass || '';

    h += '<tr>';
    h += `<td>${row.name}</td>`;
    for (let i = 0; i < periods.length; i++) {
      const v = vals[i];
      const isLast = i === lastIdx;
      let cls = extraClass;
      if (isLast) cls += ' last-col ' + deltaClass(delta, row.hb !== false);
      let txt = fmt(v, row.type);
      if (isLast && delta != null) txt += deltaTxt(delta);
      h += `<td class="${cls}">${txt}</td>`;
    }
    if (showSparkline) {
      const bad = row.hb === false;
      const lastDelta = (lastVal != null && prevVal != null && prevVal !== 0)
                        ? (lastVal - prevVal)/Math.abs(prevVal) : null;
      let sparkColor = '#667eea';
      if (lastDelta != null) sparkColor = (!bad ? lastDelta >= 0 : lastDelta <= 0) ? '#16a34a' : '#ef4444';
      h += `<td>${sparkline(vals, 70, 22, sparkColor)}</td>`;
    }
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  return h;
}

function renderBuyers(periods, labelMap, buyersByStore, growthMap) {

// ── GRÁFICOS TAB ──────────────────────────────────────────────────────────────

let chartInstances = [];

function renderGraficos(periods, labelMap, growthMap, opsMap) {
  chartInstances.forEach(c => c.destroy());
  chartInstances = [];

  const labels   = periods.map(p => (labelMap && labelMap[p]) || p);
  const nmvVals  = periods.map(p => { const r=growthMap[p]; return r&&r.NMV?r.NMV/1e6:null; });
  const cmpVals  = periods.map(p => { const r=growthMap[p]; return r?r.Compras:null; });
  const frVals   = periods.map(p => { const r=opsMap[p]; return r&&r.FR_Items?r.FR_Items*100:null; });
  const visVals  = periods.map(p => { const r=growthMap[p]; return r?r.Visitas:null; });

  let h = '<div class="charts-grid">';
  h += '<div class="chart-card"><h3>NMV (ARS M)</h3><canvas id="ch-nmv"></canvas></div>';
  h += '<div class="chart-card"><h3>Compras</h3><canvas id="ch-cmp"></canvas></div>';
  h += '<div class="chart-card"><h3>Fill Rate Items (%)</h3><canvas id="ch-fr"></canvas></div>';
  h += '<div class="chart-card"><h3>Visitas</h3><canvas id="ch-vis"></canvas></div>';
  h += '</div>';

  setTimeout(() => {
    const common = {
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:9},maxRotation:60}}, y:{ticks:{font:{size:9}}}}
    };
    const lineDs = (data, color) => [{data, borderColor:color, backgroundColor:color+'22', fill:true, tension:0.3, pointRadius:2, borderWidth:2}];
    const barDs  = (data, color) => [{data, backgroundColor:color+'cc', borderRadius:4, borderSkipped:false}];
    const ch1 = new Chart(document.getElementById('ch-nmv'), {type:'line', data:{labels, datasets:lineDs(nmvVals,'#667eea')}, options:common});
    const ch2 = new Chart(document.getElementById('ch-cmp'), {type:'bar',  data:{labels, datasets:barDs(cmpVals,'#3b82f6')},  options:common});
    const ch3 = new Chart(document.getElementById('ch-fr'),  {type:'line', data:{labels, datasets:lineDs(frVals,'#10b981')},  options:{...common, scales:{...common.scales, y:{...common.scales.y, min:70, max:100}}}});
    const ch4 = new Chart(document.getElementById('ch-vis'), {type:'bar',  data:{labels, datasets:barDs(visVals,'#f59e0b')},  options:common});
    chartInstances = [ch1, ch2, ch3, ch4];
  }, 50);
  return h;
}

// ── PLACEHOLDER ───────────────────────────────────────────────────────────────

function renderPlaceholder(title, subtitle) {
  return `<div class="placeholder"><h3>${title}</h3><p>${subtitle || ''}</p></div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────

function toggleStore(id) {
  const body = document.getElementById(id);
  const ico  = document.getElementById(id.replace('body', 'ico'));
  if (!body) return;
  const open = body.classList.toggle('open');
  if (ico) ico.textContent = open ? '▲' : '▼';
}

function setView(view) {
  VIEW = view;
  document.getElementById('btn-semanal').classList.toggle('active', view === 'semanal');
  document.getElementById('btn-mensual').classList.toggle('active', view === 'mensual');
  document.getElementById('btn-diario').classList.toggle('active',  view === 'diario');
  CUR_TAB = 'growth';
  renderAll();
}

function setTab(id) {
  CUR_TAB = id;
  renderAll();
}

function renderAll() {
  chartInstances.forEach(c => c.destroy());
  chartInstances = [];

  const tabs = VIEW === 'semanal' ? TABS_SEMANAL
             : VIEW === 'mensual' ? TABS_MENSUAL
             :                     TABS_DIARIO;

  if (!tabs.find(t => t.id === CUR_TAB)) CUR_TAB = tabs[0].id;

  document.getElementById('tabs-bar').innerHTML = tabs.map(t =>
    `<button class="tab-btn ${t.id===CUR_TAB?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`
  ).join('');

  const content = document.getElementById('content');

  // ── VISTA DIARIA ──────────────────────────────────────────────────────────
  if (VIEW === 'diario') {
    switch(CUR_TAB) {
      case 'growth':  content.innerHTML = renderDailyGrowth(); break;
      case 'ops':     content.innerHTML = renderDailyOps();    break;
      case 'buyers':  content.innerHTML = renderDailyBuyers(); break;
      case 'plan':    content.innerHTML = renderPlaceholder('Plan Diario', 'Próximamente — requiere integración con datos de plan (Plan V2 / 4+8 diario).'); break;
      default:        content.innerHTML = renderPlaceholder(CUR_TAB, '');
    }
    return;
  }

  // ── VISTA SEMANAL / MENSUAL ───────────────────────────────────────────────
  const periods   = VIEW === 'semanal' ? D.weeks   : D.months;
  const labelMap  = VIEW === 'semanal' ? D.wlabels : D.mlabels;
  const growthMap = VIEW === 'semanal' ? D.wg  : D.mg;
  const opsMap    = VIEW === 'semanal' ? D.wo  : D.mo;
  const buyersMap = VIEW === 'semanal' ? D.wb  : D.mb;
  const storeMap  = VIEW === 'semanal' ? D.ws  : D.ms;
  const visiblePeriods = periods.length > 16 ? periods.slice(-16) : periods;

  switch(CUR_TAB) {
    case 'growth':
      content.innerHTML = renderGrowth(visiblePeriods, labelMap, growthMap, storeMap);
      break;
    case 'ops':
      content.innerHTML = renderOps(visiblePeriods, labelMap, opsMap);
      break;
    case 'buyers':
      content.innerHTML = renderBuyers(visiblePeriods, labelMap, buyersMap, growthMap);
      break;
    case 'graficos':
      content.innerHTML = renderGraficos(visiblePeriods, labelMap, growthMap, opsMap);
      break;
    case 'cx':
      content.innerHTML = renderCX(visiblePeriods, labelMap, opsMap);
      break;
    case 'pl':
      content.innerHTML = renderPL(visiblePeriods, labelMap);
      break;
    case 'assortment':
      content.innerHTML = renderAssortment();
      break;
    case 'rolling':
      content.innerHTML = VIEW === 'mensual' ? renderRolling28() : renderRolling();
      break;
    case 'demo':
      content.innerHTML = renderPlaceholder('Datos Demográficos', 'Próximamente — requiere fetch de demografía (NSE, edad, género).');
      break;
    case 'nps':
      content.innerHTML = renderPlaceholder('NPS', 'Próximamente — requiere integración con datos de NPS.');
      break;
    case 'plan':
      content.innerHTML = renderPlaceholder('Plan vs Real', 'Próximamente — requiere integración con datos de plan.');
      break;
    default:
      content.innerHTML = renderPlaceholder(CUR_TAB, '');
  }
}

// Init
document.getElementById('updated-label').textContent = 'Actualizado: ' + D.generated;
renderAll();
</script>
